<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Hub Teocrático JW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700;900&family=Roboto:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Poppins:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "rgb(var(--color-primary) / <alpha-value>)",
            "background-light": "#f6f6f8",
            "background-dark": "#101722"
          },
          fontFamily: {
            display: "Sora, sans-serif",
            sans: "Roboto, sans-serif"
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --color-primary: 37 99 235;
      /* Initial Blue */
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Hide Number Input Arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    /* ===== PRINT STYLES ===== */
    @media print {

      /* Force background colors and borders to print */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide everything except the PDF content */
      body>#root>div>header,
      body>#root>div>div>aside,
      body>#root>div>div>div.fixed {
        display: none !important;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
      }

      /* Make the preview fill the page */
      body>#root>div>div>main {
        display: block !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        background: white !important;
        overflow: visible !important;
      }

      /* Reset any scaling and center the content */
      #pdf-content {
        transform: none !important;
        width: 100% !important;
        max-width: none !important;
        min-height: unset !important;
        box-shadow: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Override tailwind fixed widths */
      .w-\[816px\] {
        width: 100% !important;
      }

      /* Remove hover effects in print */
      tr:hover {
        background-color: transparent !important;
      }

      /* Force print margins to None */
      @page {
        size: letter portrait;
        margin: 0 !important;
        margin-top: 0 !important;
        margin-bottom: 0 !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
      }
    }
  </style>

</head>

<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200">
  <script type="module" src="/index.tsx"></script>
  <div id="root"></div>
</body>

</html>
